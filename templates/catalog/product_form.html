{% extends "base.html" %}
{% block title %}{% if product %}แก้ไขสินค้า{% else %}สินค้าใหม่{% endif %} · salesdee.{% endblock %}
{% block content %}
<div style="max-width:640px">
  <div class="eyebrow">สินค้า</div><h1 class="h1 serif-it" style="margin-bottom:16px">{% if product %}แก้ไขสินค้า{% else %}เพิ่มสินค้าใหม่{% endif %}</h1>
  <form method="post" class="card">{% csrf_token %}
    {% include "partials/_form.html" %}
    <div class="row" style="margin-top:12px"><button class="btn btn-primary">บันทึก</button><a class="btn btn-ghost" href="{% if product %}{% url 'catalog:product_detail' product.pk %}{% else %}{% url 'catalog:products' %}{% endif %}">ยกเลิก</a></div>
  </form>
</div>
{% endblock %}
