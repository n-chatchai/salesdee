{% extends "billing/_doc_detail.html" %}
{% block actions %}
<a class="btn btn-sm btn-ghost" href="{% url 'billing:receipt_pdf' document.pk %}" target="_blank">พิมพ์ใบเสร็จ</a>
{% if document.status != 'cancelled' %}
<form method="post" action="{% url 'billing:doc_send_email' 'receipt' document.pk %}" style="display:inline">{% csrf_token %}<button class="btn btn-sm">ส่งทางอีเมล</button></form>
<form method="post" action="{% url 'billing:doc_send_line' 'receipt' document.pk %}" style="display:inline">{% csrf_token %}<button class="btn btn-sm">ส่งทาง LINE</button></form>
{% endif %}
{% endblock %}
