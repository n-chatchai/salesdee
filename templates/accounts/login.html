{% extends "base.html" %}

{% block title %}เข้าสู่ระบบ{% endblock %}
{% block brand %}ระบบงานขาย & ใบเสนอราคา{% endblock %}

{% block content %}
  <div class="mx-auto max-w-sm rounded-lg border bg-white p-6">
    <h1 class="text-xl font-semibold">เข้าสู่ระบบ</h1>
    {% if form.errors %}
      <p class="mt-2 rounded border border-red-300 bg-red-50 px-3 py-2 text-sm text-red-700">อีเมลหรือรหัสผ่านไม่ถูกต้อง</p>
    {% endif %}
    <form method="post" class="mt-4 space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm text-slate-600" for="{{ form.username.id_for_label }}">อีเมล</label>
        <input class="mt-1 w-full rounded border px-3 py-2" type="email" name="{{ form.username.html_name }}"
               id="{{ form.username.id_for_label }}" required autofocus>
      </div>
      <div>
        <label class="block text-sm text-slate-600" for="{{ form.password.id_for_label }}">รหัสผ่าน</label>
        <input class="mt-1 w-full rounded border px-3 py-2" type="password" name="{{ form.password.html_name }}"
               id="{{ form.password.id_for_label }}" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="w-full rounded bg-slate-800 px-3 py-2 text-white hover:bg-slate-700">เข้าสู่ระบบ</button>
    </form>
  </div>
{% endblock %}
