{% extends "auth_base.html" %}
{% block title %}ยืนยันรหัส 2 ขั้นตอน · salesdee.{% endblock %}
{% block card %}
<div class="auth-title">ยืนยัน<em> 2 ขั้นตอน</em></div>
<div class="auth-sub">เปิดแอป Authenticator ของคุณ แล้วใส่รหัส 6 หลักด้านล่าง</div>

{% if error %}<ul class="auth-nonfield"><li>{{ error }}</li></ul>{% endif %}

<form method="post" class="auth-form" autocomplete="off">
  {% csrf_token %}
  <div class="auth-field">
    <div class="label"><span>รหัส 6 หลัก</span></div>
    <input name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autofocus class="auth-input">
  </div>
  <button class="auth-btn" type="submit">ยืนยัน</button>
</form>
<div class="auth-foot"><a href="{% url 'accounts:login' %}">เริ่มเข้าระบบใหม่</a></div>
{% endblock %}
