{% load i18n %}
{% if matches %}
<ul class="product-search-results" role="listbox">
  {% for p in matches %}
  <li role="option"
      data-pk="{{ p.pk }}"
      data-name="{{ p.name }}"
      data-code="{{ p.code }}"
      data-unit="{{ p.unit }}"
      data-price="{{ p.default_price|floatformat:2 }}"
      data-tax="{{ p.tax_type }}"
      data-dimensions="{{ p.dimensions|default:'' }}"
      data-material="{{ p.material|default:'' }}"
      @click="pick($el)"
      @mouseenter="hover = {{ forloop.counter0 }}"
      :class="{ 'is-hover': hover === {{ forloop.counter0 }} }">
    <div class="ps-name">{{ p.name }}{% if p.code %} <span class="mono muted">· {{ p.code }}</span>{% endif %}</div>
    <div class="ps-meta"><span class="mono">{{ p.default_price|floatformat:0 }}</span>/{{ p.unit }} · {{ p.get_tax_type_display }}</div>
  </li>
  {% endfor %}
</ul>
{% elif q %}
<div class="product-search-empty muted">ไม่พบสินค้าตรงกับ "{{ q }}"</div>
{% endif %}
