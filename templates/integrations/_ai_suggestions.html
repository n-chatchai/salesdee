{% if error %}
  <div class="ai-suggest"><div class="ai-suggest-text">{{ error }}</div></div>
{% elif suggestions %}
  {% for s in suggestions %}
  <div class="ai-suggest">
    <div class="ai-suggest-text" data-suggestion>{{ s }}</div>
    <div class="ai-suggest-actions">
      <button class="ai-use" type="button" onclick="
        var ta=document.querySelector('.chat-input textarea');
        if(ta){ ta.value=this.closest('.ai-suggest').querySelector('[data-suggestion]').innerText; ta.dispatchEvent(new Event('input')); ta.focus(); }
      ">ใช้ข้อความนี้</button>
    </div>
  </div>
  {% endfor %}
  <div class="helptext" style="margin-top:6px">ผู้ช่วยเสนอเฉย ๆ — ตรวจก่อนส่งเสมอ</div>
{% else %}
  <div class="helptext">กด "สร้าง" เพื่อให้ผู้ช่วยร่างคำตอบจากบทสนทนานี้</div>
{% endif %}
