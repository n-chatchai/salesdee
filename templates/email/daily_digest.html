<!doctype html>
<html lang="th">
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#F6F1E7;font-family:'Helvetica Neue',Arial,sans-serif;color:#1B2A3A;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F6F1E7;padding:24px 12px;">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#FCF9F2;border:1px solid #EFE8D8;border-radius:12px;overflow:hidden;">
        <tr><td style="padding:24px 28px 8px;">
          <div style="font-size:18px;font-weight:700;color:#C8501F;">salesdee · {{ tenant.name }}</div>
          <div style="font-size:14px;color:#2C3E50;margin-top:4px;">สรุปงานวันนี้ — {{ count }} รายการที่ต้องดูแล</div>
        </td></tr>
        <tr><td style="padding:8px 28px 24px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
            {% for item in items %}
            <tr><td style="padding:10px 0;border-bottom:1px solid #EFE8D8;">
              <span style="font-size:14px;color:#1B2A3A;">{{ item.text }}</span>
              {% if item.url %}<br><a href="{{ item.url }}" style="font-size:13px;color:#C8501F;text-decoration:none;">เปิดดู →</a>{% endif %}
            </td></tr>
            {% endfor %}
          </table>
        </td></tr>
        <tr><td style="padding:16px 28px;background:#EFE8D8;font-size:12px;color:#2C3E50;">
          คุณได้รับอีเมลนี้เพราะคุณเป็นสมาชิกของ workspace “{{ tenant.name }}” ใน salesdee
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
