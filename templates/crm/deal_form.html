{% extends "base.html" %}
{% block title %}{% if deal %}แก้ไขดีล{% else %}ดีลใหม่{% endif %} · salesdee.{% endblock %}
{% block content %}
<div style="max-width:560px">
  <div class="eyebrow">ดีล</div><h1 class="h1 serif-it" style="margin-bottom:16px">{% if deal %}แก้ไขดีล{% else %}สร้างดีลใหม่{% endif %}</h1>
  <form method="post" class="card">{% csrf_token %}
    {% include "partials/_form.html" %}
    <div class="row" style="margin-top:12px"><button class="btn btn-primary">บันทึก</button><a class="btn btn-ghost" href="{% if deal %}{% url 'crm:deal_detail' deal.pk %}{% else %}{% url 'crm:pipeline' %}{% endif %}">ยกเลิก</a></div>
  </form>
</div>
{% endblock %}
