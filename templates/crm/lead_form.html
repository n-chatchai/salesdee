{% extends "base.html" %}
{% block title %}{% if lead %}แก้ไขลีด{% else %}ลีดใหม่{% endif %} · salesdee.{% endblock %}
{% block content %}
<div style="max-width:560px">
  <div class="eyebrow">ลีด</div><h1 class="h1 serif-it" style="margin-bottom:16px">{% if lead %}แก้ไขลีด{% else %}เพิ่มลีดใหม่{% endif %}</h1>
  <form method="post" class="card">{% csrf_token %}
    {% include "partials/_form.html" %}
    <div class="row" style="margin-top:12px"><button class="btn btn-primary">บันทึก</button><a class="btn btn-ghost" href="{% if lead %}{% url 'crm:lead_detail' lead.pk %}{% else %}{% url 'crm:leads' %}{% endif %}">ยกเลิก</a></div>
  </form>
</div>
{% endblock %}
