<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ขอใบเสนอราคา · {{ tenant.name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { font-family: "Sarabun", system-ui, sans-serif; }
    .f input:not([type=checkbox]), .f select, .f textarea {
      display:block; width:100%; border:1px solid #cbd5e1; border-radius:0.375rem;
      padding:0.5rem 0.6rem; font-size:0.95rem; background:#fff;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 py-10">
  <div class="mx-auto max-w-lg px-4">
    <div class="rounded-xl border bg-white p-6 shadow-sm">
      <h1 class="text-lg font-semibold">ขอใบเสนอราคา / ติดต่อ {{ tenant.name }}</h1>
      <p class="mt-1 text-sm text-slate-500">กรอกข้อมูลด้านล่าง ทีมงานจะติดต่อกลับโดยเร็ว</p>
      <form method="post" class="f mt-5 space-y-4">
        {% csrf_token %}
        {% for field in form %}
          <div>
            <label class="mb-1 block text-sm font-medium text-slate-600" for="{{ field.id_for_label }}">
              {{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}
            </label>
            {{ field }}
            {% for e in field.errors %}<p class="mt-0.5 text-xs text-red-600">{{ e }}</p>{% endfor %}
          </div>
        {% endfor %}
        <button type="submit" class="w-full rounded-md bg-slate-800 px-4 py-2.5 text-white hover:bg-slate-700">ส่งข้อมูล</button>
      </form>
    </div>
  </div>
</body>
</html>
