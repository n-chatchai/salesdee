{% load static %}<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ติดต่อ · {{ tenant.name }}</title>
  <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
  <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
{% include 'partials/_icons.svg.html' %}

<div class="auth-stage">
  <div class="auth-card">
    <div class="auth-title">ติดต่อ <em>{{ tenant.name }}</em></div>
    <div class="auth-sub">กรอกข้อมูล · ทีมขายจะติดต่อกลับ</div>

    <form method="post" class="auth-form">
      {% csrf_token %}
      {% for f in form %}
        <div class="auth-field">
          <div class="label"><span>{{ f.label }}</span></div>
          {{ f }}
          {% if f.errors %}<div class="auth-err">{{ f.errors|join:" · " }}</div>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="auth-btn">ส่งคำขอ</button>
    </form>
  </div>
</div>
</body>
</html>
