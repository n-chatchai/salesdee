{% for a in activities %}
<div class="row between" style="align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)">
  <div><span class="chip">{{ a.get_kind_display }}</span> {{ a.body|linebreaksbr }}
    {% if a.created_by %}<div class="muted" style="font-size:12px">{{ a.created_by.get_short_name }}</div>{% endif %}</div>
  <span class="muted mono" style="font-size:12px;white-space:nowrap">{{ a.occurred_at|date:"d/m/Y H:i" }}</span>
</div>
{% empty %}<p class="muted">ยังไม่มีกิจกรรม</p>{% endfor %}
