{% for a in activities %}
<div class="tl-event">
  <div class="tl-event-icon{% if a.kind == 'line' or a.kind == 'email' %} good{% elif a.kind == 'call' or a.kind == 'meeting' or a.kind == 'site_visit' %} accent{% endif %}">
    <svg class="ico ico-sm"><use href="#i-{% if a.kind == 'call' %}phone{% elif a.kind == 'line' %}line-app{% elif a.kind == 'email' %}mail{% elif a.kind == 'meeting' %}users{% elif a.kind == 'site_visit' %}pin{% else %}edit{% endif %}"/></svg>
  </div>
  <div class="tl-event-body">
    <div class="tl-event-title">{{ a.get_kind_display }}{% if a.created_by %} · <strong>{{ a.created_by.get_short_name }}</strong>{% endif %}</div>
    {% if a.body %}<div class="tl-event-desc">{{ a.body|linebreaksbr }}</div>{% endif %}
  </div>
  <span class="tl-event-time">{{ a.occurred_at|date:"d/m/Y H:i" }}</span>
</div>
{% empty %}<p class="muted">ยังไม่มีกิจกรรม</p>{% endfor %}
