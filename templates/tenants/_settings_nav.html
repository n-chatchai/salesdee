{# In-page settings nav rail. #}
{% with un=request.resolver_match.url_name %}
<nav class="set-sub">
  <div class="set-sub-section">workspace</div>
  <a class="set-sub-item {% if un == 'settings_hub' %}active{% endif %}" href="{% url 'workspace:settings_hub' %}"><svg class="ico ico-sm"><use href="#i-home"/></svg> ภาพรวม</a>
  <a class="set-sub-item {% if un == 'settings_company' %}active{% endif %}" href="{% url 'workspace:settings_company' %}"><svg class="ico ico-sm"><use href="#i-building"/></svg> ข้อมูลบริษัท</a>
  <div class="set-sub-section">การเชื่อมต่อ</div>
  <a class="set-sub-item {% if un == 'settings_line' %}active{% endif %}" href="{% url 'workspace:settings_line' %}"><svg class="ico ico-sm"><use href="#i-line-app"/></svg> เชื่อม LINE OA</a>
  <div class="set-sub-section">งานขาย</div>
  <a class="set-sub-item {% if un == 'settings_pipeline' %}active{% endif %}" href="{% url 'workspace:settings_pipeline' %}"><svg class="ico ico-sm"><use href="#i-trend"/></svg> ขั้นใน Pipeline</a>
  <a class="set-sub-item {% if un == 'settings_numbering' %}active{% endif %}" href="{% url 'workspace:settings_numbering' %}"><svg class="ico ico-sm"><use href="#i-file-text"/></svg> เลขที่เอกสาร</a>
  <div class="set-sub-section">บัญชี</div>
  <a class="set-sub-item {% if un == 'settings_members' %}active{% endif %}" href="{% url 'workspace:settings_members' %}"><svg class="ico ico-sm"><use href="#i-users"/></svg> สมาชิกและสิทธิ์</a>
  <a class="set-sub-item {% if un == 'settings_billing' %}active{% endif %}" href="{% url 'workspace:settings_billing' %}"><svg class="ico ico-sm"><use href="#i-card"/></svg> แพ็กเกจ</a>
  <a class="set-sub-item {% if un == 'system_status' %}active{% endif %}" href="{% url 'workspace:system_status' %}"><svg class="ico ico-sm"><use href="#i-shield"/></svg> สถานะระบบ</a>
  <a class="set-sub-item {% if un == 'log' %}active{% endif %}" href="{% url 'audit:log' %}"><svg class="ico ico-sm"><use href="#i-file-text"/></svg> บันทึกตรวจสอบ</a>
  <div class="set-sub-section">บัญชีของคุณ</div>
  <a class="set-sub-item {% if 'two_factor' in un %}active{% endif %}" href="{% url 'accounts:two_factor_settings' %}"><svg class="ico ico-sm"><use href="#i-shield"/></svg> ความปลอดภัย (2FA)</a>
</nav>
{% endwith %}
