{% extends "auth_base.html" %}
{% block title %}ลืมรหัสผ่าน · salesdee.{% endblock %}
{% block outside_top_right %}<a href="{% url 'accounts:login' %}" class="outside-top-link">เข้าระบบ</a>{% endblock %}

{% block content %}
<div class="auth-stage">
  <div class="auth-card">
    <div class="auth-title">ลืม<em>รหัสผ่าน</em></div>
    <div class="auth-sub">ใส่อีเมลที่ลงทะเบียนไว้ · เราจะส่งลิงก์ตั้งรหัสใหม่ให้</div>

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="auth-field">
        <div class="label"><span>อีเมล</span></div>
        <div class="auth-input-wrap"><svg><use href="#i-mail"/></svg><input class="auth-input with-icon" type="email" name="email" required autofocus></div>
      </div>
      <button type="submit" class="auth-btn">ส่งลิงก์ตั้งรหัสใหม่</button>
    </form>
  </div>
</div>
{% endblock %}
